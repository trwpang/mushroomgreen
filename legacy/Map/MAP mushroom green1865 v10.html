    <div style="margin-top:6px;padding:7px 8px;background:#fffbea;border-left:3px solid #b8860b;border-radius:2px;font-size:0.78em;line-height:1.5;color:#4a3800;">
      <div style="font-weight:bold;margin-bottom:3px;">&#9733; Founder of Mushroom Green</div>
      <div><b>Henry Weaver b.1789, Sedgley</b> — patriarch of the Mushroom Green Weavers and one of the first settlers of the enclosure, establishing the family's presence in the chainmaking community. Lived here from c.1800 until 1857, when his wife Ann Maria passed away. He then moved to 52 Netherton Hill, and his son <b>John Weaver b.1824</b> took over the house.</div>
    </div>` : '';

  poly.bindPopup(`
    <div class="pt">${isFounder ? '&#9733;&nbsp;' : ''}No.&nbsp;${h.number} &mdash; Mushroom Green</div>
    <div class="pr">
      <span style="font-size:0.85em;flex:1;${nameStyle}">${c.name}</span>
      <span style="font-size:0.76em;border-radius:10px;padding:1px 7px;white-space:nowrap;background:${occBg};color:${occColor};">${c.occ} occupant${c.occ!==1?'s':''}</span>
    </div>
    ${founderPopup}
    ${estNote}
  `, {maxWidth:280});
});
</script>
</body>
</html>
